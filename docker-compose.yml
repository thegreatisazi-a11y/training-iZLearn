services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '4000'
      # MongoDB connection string (MongoDB Atlas mongodb+srv://... or a self-hosted
      # replica set). Set DATABASE_URL in the root .env — never commit it.
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 8h
      BCRYPT_COST: '12'
      # Public origin of the frontend (the Vercel URL) — used for CORS.
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      BACKUP_DESTINATION: /app/backups
      STORAGE_ROOT: /app/storage
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe@123}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
    # Bound to localhost so only the host's reverse proxy (Caddy) can reach it.
    ports:
      - '127.0.0.1:4000:4000'
    volumes:
      - storage:/app/storage
      - backups:/app/backups

# NOTE: the frontend is deployed to Vercel (build dir: frontend/). The database is
# MongoDB Atlas (or a self-hosted Mongo replica set), referenced via DATABASE_URL.
# If you ever want the all-in-one VM layout instead, frontend/Dockerfile still
# exists and can be re-added as a service here.

volumes:
  storage:
  backups:
