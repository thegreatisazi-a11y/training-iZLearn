services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-izlearn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-izlearn}
      POSTGRES_DB: ${POSTGRES_DB:-izlearn}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-izlearn}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '4000'
      DATABASE_URL: postgresql://${POSTGRES_USER:-izlearn}:${POSTGRES_PASSWORD:-izlearn}@postgres:5432/${POSTGRES_DB:-izlearn}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 8h
      BCRYPT_COST: '12'
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      BACKUP_DESTINATION: /app/backups
      STORAGE_ROOT: /app/storage
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe@123}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
    ports:
      - '4000:4000'
    volumes:
      - storage:/app/storage
      - backups:/app/backups

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8081:80'

volumes:
  pgdata:
  storage:
  backups:
