server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compress text assets on the fly (JS/CSS/JSON/SVG/etc.). Big win: the main JS
  # bundle is ~495 kB raw but ~130 kB gzipped. Already-compressed types (images,
  # video, pdf, wasm, fonts) are intentionally excluded.
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain text/css text/javascript application/javascript application/json
    application/manifest+json image/svg+xml application/xml application/wasm;

  # Security headers (defence in depth — backend also sets these via Helmet)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Vite emits content-hashed asset filenames (e.g. index-CYBhdKDc.js), so their
  # contents never change under a given name — cache them hard for a year. index.html
  # itself must NOT be cached (below) so new deploys are picked up immediately.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # Never cache the SPA entry document — it references the current hashed assets.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # ES module assets (Vite build output / pdf.js worker) must be served with a
  # JavaScript MIME type. With X-Content-Type-Options: nosniff, the browser refuses
  # to import a module served as anything else — which breaks the PDF viewer with
  # "Failed to fetch dynamically imported module … pdf.worker.min-….mjs". The empty
  # `types {}` clears the inherited map for this location so default_type wins.
  location ~* \.mjs$ {
    types { }
    default_type text/javascript;
  }

  # WebAssembly must be served as application/wasm (same nosniff constraint as .mjs),
  # so any current/future WASM asset (pdf.js codecs, etc.) instantiates correctly.
  location ~* \.wasm$ {
    types { }
    default_type application/wasm;
  }

  # SPA routing — serve index.html for any unmatched client route
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the backend service
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 0;   # no nginx cap; the effective limit is System Config upload.max_size_mb
    # Slow endpoints (large report / certificate PDF generation via Puppeteer) can
    # exceed nginx's default 60s proxy timeout and 504 in production. Give them room.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
