# UR-164: Vulnerability Management — automated dependency audit on every push/PR.
# This is an npm WORKSPACES monorepo: there is a single root package-lock.json and
# the workspaces (backend/, frontend/) do NOT have their own lockfiles, so install
# happens at the root. The audit gates on PRODUCTION dependencies only
# (--omit=dev): dev/build-only tooling advisories (vite, esbuild, vitest, etc.) do
# not ship in the deployed artifact and must not block a deploy. Any HIGH or
# CRITICAL severity finding in production deps fails the build.

name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly scan every Monday at 07:00 UTC
    - cron: '0 7 * * 1'

jobs:
  audit-backend:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspaces)
        run: npm ci

      - name: Audit backend production dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high --workspace=backend

      - name: Audit report (informational, never fails)
        if: always()
        run: npm audit --omit=dev --json --workspace=backend > audit-report-backend.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-audit-report
          path: audit-report-backend.json
          retention-days: 30

  audit-frontend:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspaces)
        run: npm ci

      - name: Audit frontend production dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high --workspace=frontend

      - name: Audit report (informational, never fails)
        if: always()
        run: npm audit --omit=dev --json --workspace=frontend > audit-report-frontend.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-audit-report
          path: audit-report-frontend.json
          retention-days: 30
